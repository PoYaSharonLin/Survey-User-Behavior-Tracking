---
# Backend secrets configuration
# Copy this file to secrets.yml and fill in your values

development:
  DATABASE_URL: sqlite://backend_app/db/store/development.db
  AWS_ACCESS_KEY_ID: IAM_ACCESS_KEY
  AWS_SECRET_ACCESS_KEY: IAM_SECRET_KEY
  AWS_REGION: ap-northeast-1
  S3_BUCKET_NAME: S3_BUCKET_NAME 

test:
  DATABASE_URL: sqlite://backend_app/db/store/test.db
  AWS_ACCESS_KEY_ID: IAM_ACCESS_KEY
  AWS_SECRET_ACCESS_KEY: IAM_SECRET_KEY
  AWS_REGION: ap-northeast-1
  S3_BUCKET_NAME: S3_BUCKET_NAME

production:
  DATABASE_URL: postgres://user:password@host:port/database
  AWS_ACCESS_KEY_ID: IAM_ACCESS_KEY
  AWS_SECRET_ACCESS_KEY: IAM_SECRET_KEY
  AWS_REGION: ap-northeast-1
  S3_BUCKET_NAME: S3_BUCKET_NAME
  # For TimescaleDB (optional upgrade):
  # DATABASE_URL: postgres://user:password@host:port/database
  # Then run: SELECT create_hypertable('behavior_events', 'timestamp');
